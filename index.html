<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora DIFAL Goiás</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    background:#050505;
    color:#00ff99;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;

    background-image:
    linear-gradient(rgba(0,255,150,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,150,.05) 1px, transparent 1px);

    background-size:30px 30px;
}

.container{
    width:700px;
    max-width:95%;
    padding:35px;
    border-radius:18px;
    background:#111;
    border:1px solid #00ff99;
    box-shadow:
    0 0 15px #00ff99,
    inset 0 0 15px rgba(0,255,120,.15);
}

h1{
    text-align:center;
    margin-bottom:10px;
    color:#00ff99;
    text-shadow:
    0 0 8px #00ff99,
    0 0 20px #00ff99;
}

.subtitulo{
    text-align:center;
    margin-bottom:30px;
    color:#88ffcc;
}

label{
    display:block;
    margin-top:18px;
    margin-bottom:8px;
}

input{
    width:100%;
    padding:14px;
    font-size:18px;
    background:#1b1b1b;
    color:#00ff99;
    border:1px solid #00ff99;
    border-radius:8px;
}

input:focus{
    outline:none;
    box-shadow:0 0 10px #00ff99;
}

.botoes{
    display:flex;
    gap:15px;
    margin-top:30px;
}

button{
    flex:1;
    padding:15px;
    font-size:18px;
    cursor:pointer;
    background:#00ff99;
    color:#000;
    border:none;
    border-radius:8px;
    font-weight:bold;
    transition:.3s;
}

button:hover{
    box-shadow:0 0 18px #00ff99;
    transform:scale(1.03);
}

.resultado{
    margin-top:35px;
}

.card{
    margin-top:15px;
    background:#191919;
    border-left:5px solid #00ff99;
    padding:18px;
    border-radius:8px;
}

.card span{
    float:right;
    font-weight:bold;
}

.total{
    margin-top:25px;
    text-align:center;
    border:2px solid #00ff99;
    border-radius:10px;
    padding:25px;
    font-size:28px;
    font-weight:bold;
    box-shadow:0 0 20px #00ff99;
}

</style>

</head>

<body>

<div class="container">

<h1>CALCULADORA DIFAL GOIÁS</h1>

<p class="subtitulo">
Uso e Consumo - Base Majorada
</p>

<label>Valor Contábil (R$)</label>
<input
type="number"
id="valor"
step="0.01"
placeholder="0,00">

<label>Alíquota Interestadual (%)</label>
<input
type="number"
id="aliquota"
step="0.01"
placeholder="Ex.: 4, 7 ou 12">

<div class="botoes">
<button onclick="calcular()">CALCULAR</button>
<button onclick="limpar()">LIMPAR</button>
</div>

<div class="resultado">

<div class="card">
Base Majorada
<span id="base">R$ 0,00</span>
</div>

<div class="card">
ICMS Goiás (19%)
<span id="icmsgo">19,00%</span>
</div>

<div class="card">
ICMS Interestadual
<span id="icmsinter">0,00%</span>
</div>

<div class="card">
Diferença de Alíquota
<span id="diferenca">0,00%</span>
</div>

<div class="total">

DIFAL A RECOLHER

<br><br>

<span id="difal">
R$ 0,00
</span>

</div>

</div>

</div>

<script>

const ALIQUOTA_GO = 19;

function moeda(valor){

    return valor.toLocaleString('pt-BR',{
        style:'currency',
        currency:'BRL'
    });

}

function percentual(valor){

    return valor.toFixed(2).replace(".",",")+"%";

}

function calcular(){

    let valor = parseFloat(document.getElementById("valor").value);

    let aliqInter = parseFloat(document.getElementById("aliquota").value);

    if(isNaN(valor) || isNaN(aliqInter)){

        alert("Informe todos os campos.");

        return;

    }

    // Base majorada
    let base = valor / 0.81;

    // Diferença das alíquotas
    let diferenca = ALIQUOTA_GO - aliqInter;

    // DIFAL
    let difal = base * (diferenca/100);

    document.getElementById("base").innerHTML = moeda(base);

    document.getElementById("icmsgo").innerHTML = percentual(ALIQUOTA_GO);

    document.getElementById("icmsinter").innerHTML = percentual(aliqInter);

    document.getElementById("diferenca").innerHTML = percentual(diferenca);

    document.getElementById("difal").innerHTML = moeda(difal);

}

function limpar(){

    document.getElementById("valor").value="";

    document.getElementById("aliquota").value="";

    document.getElementById("base").innerHTML="R$ 0,00";

    document.getElementById("icmsgo").innerHTML="19,00%";

    document.getElementById("icmsinter").innerHTML="0,00%";

    document.getElementById("diferenca").innerHTML="0,00%";

    document.getElementById("difal").innerHTML="R$ 0,00";

}

document.addEventListener("keypress",function(e){

    if(e.key==="Enter"){

        calcular();

    }

});

</script>

</body>
</html>
